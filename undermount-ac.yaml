## Written by https://github.com/anthonysecco
# Special thanks to Mike Goubeaux (Smarty Van)
# To be used with Undermount AC ESP Home Thermostat and Undermount AC System

# Connector Matrix:
# Output 1 - Blower Speed (White Wire)
# Output 2 - Blower Power On/Off (Brown Wire) 
# Output 3 - Low-Speed Compressor (Blue Wire)
# Output 4 - High-Speed Compressor (Green Wire)
# Output 5 - Unused
# Output 6 - Unused

# Substitutions
################################################################################
substitutions:
  device_name: undermount-ac
  friendly_name: "Undermount AC"

# Globals
################################################################################
globals:

  # Blower Ramp Globals
  - id: current_blower_speed
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: target_blower_speed
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: ramp_blower
    type: bool
    restore_value: no
    initial_value: 'false'

# Board Configuration
################################################################################
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: anthonysecco.undermount-ac-esphome-thermostat
    version: "0.2.0-beta"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

# Connectivity
################################################################################
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 10.0.1.27
    gateway: 10.0.1.1
    subnet: 255.255.255.0
    dns1: 10.0.1.1
  output_power: 14db # 8.5db (lowest) and 20.5db (highest)
  ap: # Backup Access Point if Wi-Fi is unavailable
    ssid: "${friendly_name} Fallback AP"
    password: "12345678"

captive_portal:

# Core Services
################################################################################
logger:
  level: DEBUG # Change to DEBUG for more logs
api:

ota:
  - platform: esphome

dashboard_import:
  package_import_url: github://anthonysecco/undermount-ac-esphome-thermostat/blob/main/undermount-ac.yaml@dev-sweep-1
  import_full_config: true

# LEDs
################################################################################

# Sensors
################################################################################

sensor:
  - platform: template
    id: blower_speed_called
    name: "Output 1 (Blower Speed)"
    accuracy_decimals: 0
    unit_of_measurement: "%"
    device_class: ""
    entity_category: "diagnostic"
    icon: mdi:fan
    filters:
      - lambda: |-
          if(id(blower_fan).state) {
            return ((x * .01) * (id(blower_pwm).get_max_power() - id(blower_pwm).get_min_power()) + id(blower_pwm).get_min_power()) * 100;
          } else {
            return 0.0;
          }

  # Uncomment sensors below for Wi-Fi Diagnostics
